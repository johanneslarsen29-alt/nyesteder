<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nye Restauranter København 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#f6f3ef;
  color:#111;
}

.hero{
  text-align:center;
  padding:80px 20px 40px;
}

.hero h1{
  font-size:48px;
  margin:0;
}

.hero p{
  color:#666;
  margin-top:10px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* SEARCH */
.search{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:15px;
  margin-bottom:20px;
}

/* FILTERS */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:25px;
}

.filter{
  padding:8px 12px;
  border-radius:999px;
  background:#fff;
  border:1px solid #eee;
  cursor:pointer;
  font-size:13px;
}

.filter.active{
  background:#111;
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-content{
  padding:14px;
}

.tag{
  font-size:12px;
  background:#efe6dc;
  padding:4px 10px;
  border-radius:999px;
  display:inline-block;
  margin-bottom:6px;
}

h3{
  margin:6px 0;
}

small{
  color:#666;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Nye Restauranter København</h1>
  <p>Live guide over nye åbninger i 2026</p>
</div>

<div class="container">

  <input class="search" id="search" placeholder="Søg restaurant, køkken eller bydel..." />

  <div class="filters">
    <div class="filter active" data-filter="all">Alle</div>
    <div class="filter" data-filter="Japansk">Japansk</div>
    <div class="filter" data-filter="Fransk">Fransk</div>
    <div class="filter" data-filter="Italiensk">Italiensk</div>
    <div class="filter" data-filter="Tapas">Tapas</div>
    <div class="filter" data-filter="Café">Café</div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
// 🔥 DATA (her bygger vi din “database”)
const restaurants = [
  {
    name:"Akaton",
    type:"Japansk",
    area:"Østerbro",
    desc:"Autentisk tonkatsu og japansk teishoku",
    img:"https://images.unsplash.com/photo-1555396273-367ea4eb4db5"
  },
  {
    name:"MELT",
    type:"Fransk",
    area:"Carlsberg Byen",
    desc:"Fondue & raclette inspireret bistro",
    img:"https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba"
  },
  {
    name:"Bar Txikitero",
    type:"Tapas",
    area:"Nørrebro",
    desc:"Baskisk tapasbar i små intime rammer",
    img:"https://images.unsplash.com/photo-1540189549336-e6e99c3679fe"
  },
  {
    name:"Kinyōbi",
    type:"Café",
    area:"Indre By",
    desc:"Listening bar + japansk inspireret café",
    img:"https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c"
  }
];

let activeFilter = "all";
let searchValue = "";

// 🧠 RENDER
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const filtered = restaurants.filter(r => {
    const matchFilter = activeFilter === "all" || r.type === activeFilter;
    const matchSearch =
      r.name.toLowerCase().includes(searchValue) ||
      r.type.toLowerCase().includes(searchValue) ||
      r.area.toLowerCase().includes(searchValue);

    return matchFilter && matchSearch;
  });

  filtered.forEach(r => {
    grid.innerHTML += `
      <div class="card">
        <img src="${r.img}" />
        <div class="card-content">
          <span class="tag">${r.type}</span>
          <h3>${r.name}</h3>
          <small>${r.area}</small>
          <p style="color:#666;font-size:13px">${r.desc}</p>
        </div>
      </div>
    `;
  });
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input", e => {
  searchValue = e.target.value.toLowerCase();
  render();
});

// 🎯 FILTERS
document.querySelectorAll(".filter").forEach(btn => {
  btn.addEventListener("click", () => {

    document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    activeFilter = btn.dataset.filter;
    render();
  });
});

render();
</script>

</body>
</html>
