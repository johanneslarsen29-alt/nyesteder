<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nye Restauranter København 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter,sans-serif;
    background:#faf8f5;
    color:#222;
}

.hero{
    height:70vh;
    background:url("hero.jpg") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero-content{
    background:rgba(0,0,0,.5);
    padding:40px;
    border-radius:20px;
    color:white;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:24px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.card-content{
    padding:24px;
}

.tag{
    display:inline-block;
    padding:6px 12px;
    background:#efe6dc;
    border-radius:999px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h1>Nye Restauranter i København</h1>
    <p>Alle restauranter åbnet i 2026 samlet ét sted</p>
  </div>
</section>

<div class="container">
  <div class="grid">

    <div class="card">
      <img src="akaton.jpg">
      <div class="card-content">
        <span class="tag">Japansk</span>
        <h3>Akaton</h3>
        <p>Østerbro · Åbnet januar 2026</p>
      </div>
    </div>

    <div class="card">
      <img src="melt.jpg">
      <div class="card-content">
        <span class="tag">Fransk</span>
        <h3>MELT</h3>
        <p>Carlsberg Byen · Åbnet marts 2026</p>
      </div>
    </div>

  </div>
</div>

</body>
</html>
